<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Elige tu idioma | Aura Textil</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100svh;
      font-family: Arial, sans-serif;
      color: #ffffff;
      background:
        linear-gradient(
          rgba(4, 10, 7, 0.55),
          rgba(4, 10, 7, 0.88)
        ),
        url("patagonia-hero.jpg") center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .language-card {
      width: min(100%, 520px);
      padding: 48px 32px;
      text-align: center;
      background: rgba(5, 14, 9, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.4);
    }

    .logo {
      width: 130px;
      max-height: 110px;
      object-fit: contain;
      margin-bottom: 28px;
    }

    .eyebrow {
      margin-bottom: 12px;
      color: #c7e65b;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    h1 {
      margin-bottom: 12px;
      font-family: Georgia, serif;
      font-size: clamp(34px, 7vw, 52px);
      font-weight: 400;
      line-height: 1.05;
    }

    .instruction {
      margin-bottom: 32px;
      color: #d5dbd6;
      font-size: 16px;
      line-height: 1.6;
    }

    .language-buttons {
      display: grid;
      gap: 14px;
    }

    .language-button {
      display: block;
      padding: 17px 20px;
      color: #07100a;
      background: #c7e65b;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 1px;
      text-decoration: none;
      text-transform: uppercase;
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .language-button:hover {
      background: #ffffff;
      transform: translateY(-2px);
    }

    .language-button.secondary {
      color: #ffffff;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.45);
    }

    .language-button.secondary:hover {
      color: #07100a;
      background: #ffffff;
    }

    .footer-text {
      margin-top: 28px;
      color: #aeb8b0;
      font-size: 12px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <main class="language-card">

    <img
      src="logo.png"
      alt="Aura Textil"
      class="logo"
    >

    <p class="eyebrow">
      Aura Textil
    </p>

    <h1>
      Habitantes de la Patagonia
    </h1>

    <p class="instruction">
      Elige tu idioma<br>
      Choose your language
    </p>

    <div class="language-buttons">

      <a href="index.html" class="language-button">
        Español
      </a>

      <a href="en/index.html" class="language-button secondary">
        English
      </a>

    </div>

    <p class="footer-text">
      Una experiencia inspirada en la Patagonia.<br>
      An experience inspired by Patagonia.
    </p>

  </main>

</body>
</html>
