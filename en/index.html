<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Patagonia’s Inhabitants | Aura Textil</title>

  <meta
    name="description"
    content="Discover the wildlife that gives life to and inspires our first collection, Patagonia Salvaje."
  >

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100svh;
      font-family: Arial, sans-serif;
      color: #ffffff;
      background:
        linear-gradient(
          rgba(3, 10, 6, 0.35),
          rgba(3, 10, 6, 0.82)
        ),
        url("../patagonia-hero.jpg") center / cover no-repeat fixed;
    }

    .hero {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }

    .hero-content {
      width: min(100%, 760px);
      padding: 46px 28px;
      background: rgba(4, 13, 8, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 26px;
      backdrop-filter: blur(8px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    .eyebrow {
      margin-bottom: 16px;
      color: #c7e65b;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    h1 {
      margin-bottom: 20px;
      font-family: Georgia, serif;
      font-size: clamp(42px, 9vw, 76px);
      font-weight: 400;
      line-height: 1;
    }

    .description {
      max-width: 620px;
      margin: 0 auto 30px;
      color: #e1e6e2;
      font-size: clamp(16px, 3vw, 19px);
      line-height: 1.7;
    }

    .button {
      display: inline-block;
      padding: 17px 28px;
      color: #07100a;
      background: #c7e65b;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1px;
      text-decoration: none;
      text-transform: uppercase;
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .button:hover {
      background: #ffffff;
      transform: translateY(-2px);
    }

    .language-link {
      display: block;
      width: fit-content;
      margin: 22px auto 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
      text-decoration: none;
    }

    .language-link:hover {
      color: #ffffff;
    }

    .status {
      margin-top: 32px;
      color: #aeb8b0;
      font-size: 12px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <main class="hero">
    <div class="hero-content">

      <p class="eyebrow">
        A photographic and sound experience
      </p>

      <h1>
        Patagonia’s Inhabitants
      </h1>

      <p class="description">
        Discover the wildlife that gives life to and inspires our first
        collection, “Patagonia Salvaje”.
      </p>

      <a href="../puma/" class="button">
        Discover the puma
      </a>

      <a href="../idioma.html" class="language-link">
        Change language
      </a>

      <p class="status">
        The complete English experience is currently being prepared.
      </p>

    </div>
  </main>

</body>
</html>
